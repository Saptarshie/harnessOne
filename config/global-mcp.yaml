# Global MCP servers — available in ALL projects
# Local .harness/config.yaml can override or add project-specific servers
# Format: same as mcp_servers in config.yaml

mcp_servers:
  # Filesystem — access files in current project directory
  - name: filesystem
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "."]

  # Context7 — up-to-date library documentation
  - name: context7
    command: npx
    args: ["-y", "@upstash/context7-mcp"]

  # GitHub — repo management, issues, PRs (needs GITHUB_TOKEN env)
